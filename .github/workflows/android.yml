name: Android Build

on:
  push:
    branches: [ master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Report Build Started
      uses: appleboy/telegram-action@v1.0.1
      with:
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        message: |
          🚀 Build Started
          Repo: ${{ github.repository }}
          Commit: ${{ github.sha }}

    - name: Build Debug APK
      run: gradle clean assembleDebug --info --stacktrace

    - name: Prepare APK
      if: success()
      run: cp app/build/outputs/apk/debug/app-debug.apk FlowStable-Wallet-Latest.apk

    - name: Send Success Notification
      if: success()
      uses: appleboy/telegram-action@v1.0.1
      with:
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        document: FlowStable-Wallet-Latest.apk
        message: |
          ✅ Android Build SUCCESS
          
          App: FlowStable Wallet
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Contributor: ${{ github.actor }}
          
          The APK is attached below.

    - name: Send Failure Notification
      if: failure()
      uses: appleboy/telegram-action@v1.0.1
      with:
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        message: |
          ❌ Android Build FAILED
          
          App: FlowStable Wallet
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Contributor: ${{ github.actor }}
          
          Check GitHub Actions logs for details.

    - name: Upload Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: FlowStable-Wallet-Artifact
        path: FlowStable-Wallet-Latest.apk

    - name: Create Release
      if: success() && github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest Continuous Build
        files: FlowStable-Wallet-Latest.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
