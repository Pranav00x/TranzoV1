name: Android Build

on:
  push:
    branches: [ master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout source
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get commit info
      id: commit_info
      run: |
        echo "subject<<EOF" >> $GITHUB_OUTPUT
        git log -1 --pretty=format:"%s" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        if [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
          FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null | head -15)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        else
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "—" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        fi

    - name: Notify – Build started (who & what changed)
      uses: appleboy/telegram-action@v1.0.1
      with:
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        message: |
          🔨 Tranzo Android build started

          👤 Pushed by: ${{ github.actor }}
          📝 Commit: ${{ steps.commit_info.outputs.short_sha }}
          💬 Message: ${{ steps.commit_info.outputs.subject }}

          📁 Changed files:
          ${{ steps.commit_info.outputs.files }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Debug APK
      run: ./gradlew clean assembleDebug --no-daemon

    - name: Prepare APK
      run: cp app/build/outputs/apk/debug/app-debug.apk Tranzo-Wallet-Latest.apk

    - name: Send APK to Telegram
      if: success()
      uses: appleboy/telegram-action@v1.0.1
      with:
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        document: Tranzo-Wallet-Latest.apk
        message: |
          ✅ Build OK — APK attached

          👤 Pushed by: ${{ github.actor }}
          📝 ${{ steps.commit_info.outputs.short_sha }} — ${{ steps.commit_info.outputs.subject }}
          🌿 ${{ github.ref_name }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Tranzo-Wallet-Artifact
        path: Tranzo-Wallet-Latest.apk

    - name: Create Release
      if: github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: latest
        name: Tranzo Wallet - Latest Build
        files: Tranzo-Wallet-Latest.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Final build report
      if: always()
      uses: appleboy/telegram-action@v1.0.1
      with:
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        message: |
          📊 Build finished: ${{ job.status }}

          👤 Pushed by: ${{ github.actor }}
          📝 ${{ steps.commit_info.outputs.short_sha }} — ${{ steps.commit_info.outputs.subject }}
          📁 Changed: ${{ steps.commit_info.outputs.files }}
